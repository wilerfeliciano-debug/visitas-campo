<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visitas Campo</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4CAF50">
<link rel="icon" href="icon.png">
<style>
body { font-family: Arial,sans-serif; background:#f0f0f0; padding:15px; }
h1, h2 { text-align:center; }
input, select, textarea, button { display:block; margin:5px 0 15px 0; width:100%; padding:8px; font-size:16px; }
.visita { background:#fff; padding:10px; margin-bottom:10px; border-radius:8px; box-shadow:0px 2px 4px rgba(0,0,0,0.1); }
.visita h3 { margin:0; }
.btn-editar { background-color:#4CAF50; color:white; border:none; padding:5px 10px; margin-top:5px; cursor:pointer; border-radius:4px; }
</style>
</head>
<body>

<div style="position:fixed; top:10px; right:10px; z-index:1000;">
  <button onclick="exportarVisitas()" style="font-size:11px;padding:3px 5px;margin-right:3px;background:#ccc;color:#000;border:none;border-radius:4px;cursor:pointer;">Exportar</button>
  <button onclick="document.getElementById('importFile').click()" style="font-size:11px;padding:3px 5px;background:#ccc;color:#000;border:none;border-radius:4px;cursor:pointer;">Importar</button>
  <input type="file" id="importFile" accept="*/*" style="display:none" onchange="importarVisitas(event)">
</div>

<h1>Visitas Campo</h1>
<h2>Nova Visita</h2>

<input type="text" id="nome" placeholder="Nome da família/casal">
<input type="text" id="endereco" placeholder="Endereço da casa">
<select id="tipo">
  <option value="">Tipo de visita</option>
  <option value="Almoço">Almoço</option>
  <option value="Café da tarde">Café da tarde</option>
  <option value="Jantar">Jantar</option>
  <option value="Pouso">Pouso</option>
</select>

<!-- Inputs nativos de hora e data -->
<input type="time" id="horario" placeholder="Horário da visita">
<input type="date" id="data" placeholder="Data da visita">

<textarea id="observacoes" placeholder="Observações"></textarea>
<button onclick="salvarVisita()">Salvar Visita</button>

<h2>Visitas Planejadas</h2>
<div id="listaVisitas"></div>

<script>
let visitas = [];
let editIndex = null;

// Carregar visitas do localStorage
if(localStorage.getItem('visitasCampo')){
  visitas = JSON.parse(localStorage.getItem('visitasCampo'));
  atualizarLista();
}

// Permissão de notificação
if("Notification" in window) Notification.requestPermission();

function salvarVisita(){
  const nome = document.getElementById('nome').value.trim();
  const endereco = document.getElementById('endereco').value.trim();
  const tipo = document.getElementById('tipo').value;
  const horario = document.getElementById('horario').value;
  const data = document.getElementById('data').value;
  const observacoes = document.getElementById('observacoes').value.trim();

  if(!nome || !tipo || !horario || !data){ alert("Preencha todos os campos obrigatórios!"); return; }

  const visita = { nome, endereco, tipo, horario, observacoes, data };

  if(editIndex !== null){
    visitas[editIndex] = visita;
    editIndex = null;
  } else {
    visitas.push(visita);
    agendarNotificacao(visita);
  }

  localStorage.setItem('visitasCampo', JSON.stringify(visitas));
  atualizarLista();
  limparCampos();
  alert("Visita salva com sucesso!");
}

function limparCampos(){
  document.getElementById('nome').value = '';
  document.getElementById('endereco').value = '';
  document.getElementById('tipo').value = '';
  document.getElementById('horario').value = '';
  document.getElementById('data').value = '';
  document.getElementById('observacoes').value = '';
}

function atualizarLista(){
  const lista = document.getElementById('listaVisitas');
  lista.innerHTML = '';
  visitas.sort((a,b) => new Date(a.data + "T" + a.horario) - new Date(b.data + "T" + b.horario));
  
  if(visitas.length === 0){
    lista.innerHTML = "<p>Nenhuma visita cadastrada.</p>";
    return;
  }

  visitas.forEach((v,index) => {
    const div = document.createElement('div');
    div.className = 'visita';

    const dataObj = v.data ? new Date(v.data) : null;
    const dataFormatada = dataObj ? dataObj.toLocaleDateString('pt-BR') : 'Sem data';
    const diaSemana = dataObj ? dataObj.toLocaleDateString('pt-BR', { weekday: 'long' }) : '';

    div.innerHTML = `<h3>${v.nome} (${dataFormatada} - ${diaSemana} às ${v.horario})</h3>
                     <p>Endereço: ${v.endereco || '-'}</p>
                     <p>Tipo: ${v.tipo}</p>
                     <p>Observações: ${v.observacoes || '-'}</p>
                     <button class="btn-editar" onclick="editarVisita(${index})">Editar</button>
                     <button onclick="excluirVisita(${index})" style="background:red;color:white;border:none;padding:5px 10px;margin-top:5px;border-radius:4px;">Excluir</button>`;
    lista.appendChild(div);
  });
}

function editarVisita(index){
  const v = visitas[index];
  document.getElementById('nome').value = v.nome;
  document.getElementById('endereco').value = v.endereco;
  document.getElementById('tipo').value = v.tipo;
  document.getElementById('horario').value = v.horario || '';
  document.getElementById('data').value = v.data || '';
  document.getElementById('observacoes').value = v.observacoes || '';
  editIndex = index;
}

function excluirVisita(index){
  if(confirm("Tem certeza que deseja excluir essa visita?")){
    visitas.splice(index,1);
    localStorage.setItem('visitasCampo', JSON.stringify(visitas));
    atualizarLista();
  }
}

// Exportar/Importar
function exportarVisitas(){
  const dataStr = JSON.stringify(visitas, null, 2);
  const blob = new Blob([dataStr], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'visitasCampo.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importarVisitas(event){
  const file = event.target.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = e => {
    try{
      const imported = JSON.parse(e.target.result);
      if(Array.isArray(imported)){
        visitas = imported;
        localStorage.setItem('visitasCampo', JSON.stringify(visitas));
        atualizarLista();
        alert("Visitas importadas com sucesso!");
      } else {
        alert("Arquivo inválido!");
      }
    } catch(err){
      alert("Erro ao ler arquivo!");
    }
  };
  reader.readAsText(file);
}

// Notificações
function agendarNotificacao(visita){
  if("Notification" in window && Notification.permission === "granted"){
    const agora = new Date();
    const notifTime = new Date(visita.data + "T" + visita.horario);
    const tempo = notifTime.getTime() - agora.getTime();
    if(tempo < 0) return;
    setTimeout(() => {
      new Notification(`Visita Campo: ${visita.nome}`, { body: `${visita.tipo} - ${visita.endereco}` });
    }, tempo);
  }
}
</script>

</body>
</html>
