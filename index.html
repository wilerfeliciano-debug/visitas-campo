<!DOCTYPE html>  <html lang="pt-BR">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>Visitas Campo</title>  

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4CAF50">
<link rel="icon" href="icon.png">

<style>  
  body {  
    font-family: Arial, sans-serif;  
    background: #f0f0f0;  
    padding: 15px;  
  }  
  h1 {  
    text-align: center;  
  }  
  input, select, textarea, button {  
    display: block;  
    margin: 5px 0 15px 0;  
    width: 100%;  
    padding: 8px;  
    font-size: 16px;  
  }  
  .visita {  
    background: #fff;  
    padding: 10px;  
    margin-bottom: 10px;  
    border-radius: 8px;  
    box-shadow: 0px 2px 4px rgba(0,0,0,0.1);  
  }  
  .visita h3 {  
    margin: 0;  
  }  
  .btn-editar {  
    background-color: #4CAF50;  
    color: white;  
    border: none;  
    padding: 5px 10px;  
    margin-top: 5px;  
    cursor: pointer;  
    border-radius: 4px;  
  }  
</style>  
</head>  
<body>  <h1>Visitas Campo</h1>  <h2>Nova Visita</h2>  
<input type="text" id="nome" placeholder="Nome da família/casal">  
<input type="text" id="endereco" placeholder="Endereço da casa">  
<select id="dia">  
  <option value="">Selecione o dia da semana</option>  
  <option value="Segunda-feira">Segunda-feira</option>  
  <option value="Terça-feira">Terça-feira</option>  
  <option value="Quarta-feira">Quarta-feira</option>  
  <option value="Quinta-feira">Quinta-feira</option>  
  <option value="Sexta-feira">Sexta-feira</option>  
  <option value="Sábado">Sábado</option>  
  <option value="Domingo">Domingo</option>  
</select>  
<select id="tipo">  
  <option value="">Tipo de visita</option>  
  <option value="Almoço">Almoço</option>  
  <option value="Café da tarde">Café da tarde</option>  
  <option value="Jantar">Jantar</option>  
  <option value="Pouso">Pouso</option>  
</select>  
<input type="time" id="horario" placeholder="Horário da visita">  
<textarea id="observacoes" placeholder="Observações"></textarea>  
<button onclick="salvarVisita()">Salvar Visita</button>  <h2>Visitas Planejadas</h2>  
<div id="listaVisitas"></div>  <script>  
let visitas = [];  
let editIndex = null;  
  
// Carregar visitas do localStorage  
if(localStorage.getItem('visitasCampo')) {  
  visitas = JSON.parse(localStorage.getItem('visitasCampo'));  
  atualizarLista();  
}  
  
// Solicitar permissão de notificação  
if ("Notification" in window) {  
  Notification.requestPermission();  
}  
  
function salvarVisita() {  
  const nome = document.getElementById('nome').value;  
  const endereco = document.getElementById('endereco').value;  
  const dia = document.getElementById('dia').value;  
  const tipo = document.getElementById('tipo').value;  
  const horario = document.getElementById('horario').value;  
  const observacoes = document.getElementById('observacoes').value;  
  
  if(!nome || !dia || !tipo || !horario) {  
    alert("Preencha todos os campos obrigatórios!");  
    return;  
  }  
  
  const visita = { nome, endereco, dia, tipo, horario, observacoes };  
  
  if(editIndex !== null) {  
    visitas[editIndex] = visita;  
    editIndex = null;  
  } else {  
    visitas.push(visita);  
    agendarNotificacao(visita);  
  }  
  
  localStorage.setItem('visitasCampo', JSON.stringify(visitas));  
  atualizarLista();  
  limparCampos();  
}  
  
function limparCampos() {  
  document.getElementById('nome').value = '';  
  document.getElementById('endereco').value = '';  
  document.getElementById('dia').value = '';  
  document.getElementById('tipo').value = '';  
  document.getElementById('horario').value = '';  
  document.getElementById('observacoes').value = '';  
}  
  
function atualizarLista() {  
  const lista = document.getElementById('listaVisitas');  
  lista.innerHTML = '';  
  visitas.forEach((v, index) => {  
    const div = document.createElement('div');  
    div.className = 'visita';  
    
    div.innerHTML = `<h3>${v.nome} (${v.dia} - ${v.horario})</h3>  
                 <p>Endereço: ${v.endereco}</p>  
                 <p>Tipo: ${v.tipo}</p>  
                 <p>Observações: ${v.observacoes}</p>  
                 <button class="btn-editar" onclick="editarVisita(${index})">Editar</button>
                 <button onclick="excluirVisita(${index})" style="background:red;color:white;border:none;padding:5px 10px;margin-top:5px;border-radius:4px;">Excluir</button>`;
   
    lista.appendChild(div);  
  });  
}  
  
function editarVisita(index) {  
  const v = visitas[index];  
  document.getElementById('nome').value = v.nome;  
  document.getElementById('endereco').value = v.endereco;  
  document.getElementById('dia').value = v.dia;  
  document.getElementById('tipo').value = v.tipo;  
  document.getElementById('horario').value = v.horario;  
  document.getElementById('observacoes').value = v.observacoes;  
  editIndex = index;  
}  
function excluirVisita(index) {
  if(confirm("Tem certeza que deseja excluir essa visita?")) {
    visitas.splice(index, 1); // remove da lista
    localStorage.setItem('visitasCampo', JSON.stringify(visitas)); // atualiza storage
    atualizarLista(); // atualiza tela
  }
}
  
// Agendar notificação (simples, no mesmo dia)  
function agendarNotificacao(visita) {  
  if ("Notification" in window && Notification.permission === "granted") {  
    const [horas, minutos] = visita.horario.split(":").map(Number);  
    const agora = new Date();  
    const notifTime = new Date();  
    notifTime.setHours(horas, minutos, 0, 0);  
  
    let tempoParaNotificar = notifTime.getTime() - agora.getTime();  
    if (tempoParaNotificar < 0) {  
      console.log("Horário já passou, não será notificado.");  
      return;  
    }  
  
    setTimeout(() => {  
      new Notification(`Visita Campo: ${visita.nome}`, {  
        body: `${visita.tipo} - ${visita.endereco}`,  
      });  
    }, tempoParaNotificar);  
  }  
}  
</script>  </body>  
</html>
